<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOCALPulse · Set your password</title>
<link rel="stylesheet" href="/css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div class="login-wrap">
  <h1><span class="brand"><span class="dot"></span>LOCALPulse</span></h1>
  <p class="sub">Welcome — set a password to finish activating your account.</p>

  <form id="pw-form">
    <label for="password">New password</label>
    <input id="password" type="password" required minlength="6" />
    <button type="submit" style="margin-top:20px; width:100%;">Set password & continue</button>
    <p class="error hidden" id="err"></p>
  </form>
</div>

<script src="/js/config.js"></script>
<script>
const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

// Supabase's invite/reset links redirect here with the session in the URL hash.
// The client library auto-detects and stores it when detectSessionInUrl is on (default).
document.getElementById('pw-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.classList.add('hidden');
  const password = document.getElementById('password').value;

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    err.textContent = 'This invite link is invalid or expired. Ask your admin to resend it.';
    err.classList.remove('hidden');
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({ password });
  if (error) {
    err.textContent = error.message;
    err.classList.remove('hidden');
    return;
  }

  // Reuse the same session token as our app's auth token, matching what
  // /index.html's login flow stores.
  const user = session.user;
  localStorage.setItem('lp_token', session.access_token);
  localStorage.setItem('lp_user', JSON.stringify({
    id: user.id, email: user.email,
    role: user.user_metadata?.role || 'business_owner',
    name: user.user_metadata?.name || null
  }));
  window.location.href = (user.user_metadata?.role === 'admin') ? '/admin.html' : '/owner.html';
});
</script>
</body>
</html>
