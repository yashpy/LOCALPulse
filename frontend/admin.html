<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOCALPulse · Admin</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span>LOCALPulse <span class="place">/ admin · Tempe, AZ</span></div>
  <div class="who">
    <span id="who-name"></span>
    <button class="ghost small" id="logout">Sign out</button>
    <button class="danger small" id="delete-account">Delete my account</button>
  </div>
</div>

<div class="wrap">

  <div class="section-head">
    <div>
      <div class="eyebrow">Awaiting review</div>
      <h2>Pending access requests</h2>
    </div>
  </div>
  <div id="requests-list" class="grid"><div class="empty">Loading…</div></div>

  <div class="section-head">
    <div>
      <div class="eyebrow">Accounts</div>
      <h2>Business owners</h2>
    </div>
    <button id="new-owner-btn">+ New owner account</button>
  </div>
  <div id="owners-list" class="grid"><div class="empty">Loading…</div></div>

  <div class="section-head">
    <div>
      <div class="eyebrow">Directory</div>
      <h2>Businesses in Tempe</h2>
    </div>
    <button id="new-business-btn">+ New business</button>
  </div>
  <div id="businesses-list" class="grid"><div class="empty">Loading…</div></div>

</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
