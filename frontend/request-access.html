<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOCALPulse · Request access</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="login-wrap" style="max-width:420px;">
  <h1><span class="brand"><span class="dot"></span>LOCALPulse</span></h1>
  <p class="sub">Request a business owner account. An admin reviews every request before it's active — this isn't instant. If approved, you'll get an email invite to set your own password.</p>

  <form id="req-form">
    <label for="name">Your name</label>
    <input id="name" required />

    <label for="email">Email</label>
    <input id="email" type="email" required />

    <label for="business_name">Business name (as it appears on Google/Yelp, Tempe AZ)</label>
    <input id="business_name" required placeholder="e.g. Cocina Chiwas" />

    <button type="submit" style="margin-top:20px; width:100%;">Submit request</button>
    <p class="error hidden" id="err"></p>
  </form>

  <div id="success" class="hidden" style="margin-top:20px; font-size:13px; color:var(--muted);"></div>

  <p style="margin-top:22px; font-size:12px;"><a href="/index.html">Back to sign in</a></p>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script>
document.getElementById('req-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  const success = document.getElementById('success');
  err.classList.add('hidden');
  const businessName = document.getElementById('business_name').value.trim();
  try {
    const data = await api('/auth/request-access', {
      method: 'POST',
      body: {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value.trim(),
        business_name: businessName
      }
    });
    document.getElementById('req-form').classList.add('hidden');
    success.classList.remove('hidden');
    success.textContent = data.google_match_found
      ? `Request submitted. We found a matching Google listing for "${businessName}" in Tempe — that'll help your admin verify it faster. You'll get an email invite once approved.`
      : `Request submitted. We couldn't auto-match a Google listing for that name — your admin will verify manually. You'll get an email invite once approved.`;
  } catch (e2) {
    err.textContent = e2.message;
    err.classList.remove('hidden');
  }
});
</script>
</body>
</html>
